# slop — dogfood config (slop linting itself, default thresholds)

root = "src"
languages = ["python"]
exclude = ["**/_aux/**"]

[rules.hotspots]
enabled = false                 # new project — no meaningful churn history yet

[rules.packages]
enabled = false                 # small corpus (4 packages after _aux exclude), I/A/D' is noisy
