# slop — dogfood config (slop linting itself, default thresholds)

root = "src"
languages = ["python"]
exclude = [
    "**/_fs/**",
    "**/_text/**",
    "**/_ast/**",
    "**/_compose/**",
    "**/_structural/**",
    "**/_util/**",
]

[rules.hotspots]
enabled = false                 # new project — no meaningful churn history yet

[rules.packages]
enabled = false                 # small corpus once the kernel subpackages are excluded; I/A/D' is noisy
